<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trailbox IoT Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#050505;
color:white;
min-height:100vh;
overflow-x:hidden;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(0,255,180,.15),transparent 30%),
radial-gradient(circle at 80% 70%,rgba(0,120,255,.15),transparent 30%);
z-index:-1;
}

.container{
max-width:1300px;
margin:auto;
padding:40px 20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo{
font-size:34px;
font-weight:900;
}

.tag{
color:#8a8a8a;
margin-top:8px;
}

.live-badge{
padding:10px 18px;
border-radius:999px;
background:#00ff8820;
color:#00ff88;
border:1px solid #00ff8840;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:24px;
}

.card{
background:rgba(255,255,255,.04);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
padding:30px;
}

.main-card{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:420px;
}

.label{
font-size:18px;
color:#9a9a9a;
}

.value{
font-size:140px;
font-weight:900;
line-height:1;
margin:20px 0;
text-shadow:0 0 40px rgba(0,255,150,.4);
}

.status{
display:flex;
gap:10px;
align-items:center;
color:#00ff88;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
background:#00ff88;
box-shadow:0 0 20px #00ff88;
}

.side{
display:flex;
flex-direction:column;
gap:20px;
}

.mini{
padding:25px;
}

.mini-title{
color:#888;
font-size:14px;
}

.mini-value{
font-size:28px;
font-weight:700;
margin-top:10px;
}

.feed{
margin-top:25px;
}

.feed-title{
font-size:22px;
margin-bottom:15px;
}

.feed-list{
display:flex;
flex-direction:column;
gap:10px;
max-height:250px;
overflow:auto;
}

.feed-item{
padding:14px;
background:rgba(255,255,255,.03);
border-radius:14px;
display:flex;
justify-content:space-between;
}

.footer{
margin-top:30px;
text-align:center;
color:#666;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.value{
font-size:80px;
}

.header{
flex-direction:column;
gap:15px;
}

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="header">

<div>
<div class="logo">TVMS</div>
<div class="tag">
TrailBox Vehicle Monitoring System
</div>
</div>

<div class="live-badge">
🟢 LIVE
</div>

</div>

<div class="grid">

<div class="card main-card">

<div class="label">
Current LDR Value
</div>

<div class="value" id="sensorValue">
--
</div>

<div class="status">
<div class="dot"></div>
Receiving Live Data
</div>

</div>

<div class="side">

<div class="card mini">
<div class="mini-title">Device</div>
<div class="mini-value">
STM32 + ESP32
</div>
</div>

<div class="card mini">
<div class="mini-title">MQTT Status</div>
<div class="mini-value" id="mqttStatus">
Connecting...
</div>
</div>

<div class="card mini">
<div class="mini-title">Last Update</div>
<div class="mini-value" id="lastUpdate">
--
</div>
</div>

</div>

</div>

<div class="card feed">

<div class="feed-title">
Live Activity Feed
</div>

<div class="feed-list" id="feed">
</div>

</div>

<div class="footer">
Trailbox IoT Dashboard • Version 1
</div>

</div>

<script>

const client = mqtt.connect(
'wss://YOUR_URL_HERE.hivemq.cloud:8884/mqtt',
{
username:'YOUR_USER_NAME',
password:'YOUR_PASSWORD'
});

client.on('connect',()=>{

document.getElementById(
'mqttStatus'
).innerText='Connected';

client.subscribe(
'talktrail/vehicle/ldr'
);

});

client.on('message',(topic,message)=>{

const value = message.toString();

document.getElementById(
'sensorValue'
).innerText = value;

document.getElementById(
'lastUpdate'
).innerText =
new Date().toLocaleTimeString();

const feed =
document.getElementById('feed');

const item =
document.createElement('div');

item.className='feed-item';

item.innerHTML =
'<span>'+value+'</span><span>'
+new Date().toLocaleTimeString()+
'</span>';

feed.prepend(item);

if(feed.children.length > 10)
{
feed.removeChild(
feed.lastChild
);
}

});

client.on('error',()=>{

document.getElementById(
'mqttStatus'
).innerText='Offline';

});

</script>

</body>
</html>
